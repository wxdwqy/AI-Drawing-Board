name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build release exe
        run: cargo build --release
        working-directory: src-tauri

      - name: Check exe exists
        run: |
          if (Test-Path "src-tauri/target/release/ai-drawing-board.exe") {
            Write-Host "exe found!"
            $size = (Get-Item "src-tauri/target/release/ai-drawing-board.exe").Length / 1MB
            Write-Host "Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "exe NOT found"
            dir src-tauri/target/release/*.exe
          }
        shell: pwsh

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: AI绘图板-windows
          path: src-tauri/target/release/ai-drawing-board.exe
          if-no-files-found: error
