name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workflows: src-tauri

      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli

      - name: Build Tauri app
        run: cargo tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: |
          dir src-tauri\target\release\*.exe
          dir src-tauri\target\release\bundle\exe\*.exe
        shell: cmd

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: AI绘图板-windows
          path: |
            src-tauri/target/release/ai-drawing-board.exe
            src-tauri/target/release/bundle/exe/*.exe
          if-no-files-found: try
